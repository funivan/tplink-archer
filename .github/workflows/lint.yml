name: Lint

on:
  push:
  pull_request:

jobs:
  lint-sh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck scripts/*.sh

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
      - name: Install deps (skip postinstall)
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: ESLint
        run: yarn lint
